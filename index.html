<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amsterdam Buurten Selector</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info-box {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.96);
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 280px;
      max-width: 380px;
      font-size: 14px;
      line-height: 1.4;
      max-height: calc(100vh - 24px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .info-box h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
    }

    .field-group {
      margin-bottom: 10px;
    }

    .field-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .field-group input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      background: #111827;
      color: white;
    }

    button.secondary {
      background: #6b7280;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-line {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 10px;
    }

    #selection-list {
      margin: 8px 0 0 0;
      padding: 0 4px 0 0;
      list-style: none;
      overflow-y: auto;
      overflow-x: hidden;
      flex: 1 1 auto;
      min-height: 0;
    }

    #selection-list li {
      border-bottom: 1px solid #e5e7eb;
      padding: 8px 0;
      word-break: break-word;
    }

    #selection-list li:last-child {
      border-bottom: none;
    }

    .buurt-name {
      font-weight: 600;
    }

    .meta {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .leaflet-tooltip {
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="info-box">
    <h3>Selected buurten</h3>

    <div class="field-group">
      <label for="username-input">Your name</label>
      <input id="username-input" type="text" placeholder="e.g. Valentijn" />
    </div>

    <div id="selection-count">0 selected</div>
    <div id="live-status" class="status-line">Connecting…</div>

    <div class="controls">
      <button id="import-btn">Import GeoJSON</button>
      <button id="export-json-btn" disabled>Export GeoJSON</button>
      <button id="export-names-btn" disabled>Export names</button>
      <button id="clear-btn" class="secondary" disabled>Clear all</button>
    </div>

    <ul id="selection-list"></ul>
  </div>

  <input
    id="import-file-input"
    type="file"
    accept=".geojson,.json,application/geo+json,application/json"
    style="display:none"
  />

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      remove,
      onValue,
      get,
      child
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    // =========================
    // 1. REPLACE THIS WITH YOUR FIREBASE CONFIG
    // =========================
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.firebasestorage.app",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const selectionRef = ref(db, "maps/amsterdam/selectedBuurten");

    const map = L.map("map").setView([52.3728, 4.8936], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const selectedIds = new Set();
    const selectedNames = new Map();
    const selectedFeatures = new Map();
    const selectedMeta = new Map();
    const layerById = new Map();
    const featureById = new Map();

    let buurtenLoaded = false;
    let pendingRemoteData = null;

    const usernameInput = document.getElementById("username-input");
    const selectionCountEl = document.getElementById("selection-count");
    const selectionListEl = document.getElementById("selection-list");
    const liveStatusEl = document.getElementById("live-status");

    usernameInput.value = localStorage.getItem("mapUserName") || "";
    usernameInput.addEventListener("input", () => {
      localStorage.setItem("mapUserName", usernameInput.value.trim());
    });

    function getCurrentUserName() {
      return usernameInput.value.trim() || "Anonymous";
    }

    function getFeatureId(feature) {
      return (
        feature.properties?.identificatie ||
        feature.properties?.id ||
        feature.properties?.code ||
        feature.properties?.volgnummer ||
        feature.properties?.naam
      );
    }

    function getFeatureName(feature) {
      return (
        feature.properties?.naam ||
        feature.properties?.name ||
        "Onbekende buurt"
      );
    }

    function formatTimestamp(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleString("nl-NL");
    }

    function baseStyle() {
      return {
        color: "#4b5563",
        weight: 1,
        opacity: 0.9,
        fillColor: "#94a3b8",
        fillOpacity: 0.20
      };
    }

    function hoverStyle() {
      return {
        color: "#1f2937",
        weight: 2,
        opacity: 1,
        fillColor: "#94a3b8",
        fillOpacity: 0.35
      };
    }

    function selectedStyle() {
      return {
        color: "#b91c1c",
        weight: 2,
        opacity: 1,
        fillColor: "#ef4444",
        fillOpacity: 0.55
      };
    }

    function applyStyle(layer, isSelected) {
      layer.setStyle(isSelected ? selectedStyle() : baseStyle());
    }

    function updateButtons(count) {
      document.getElementById("export-json-btn").disabled = count === 0;
      document.getElementById("export-names-btn").disabled = count === 0;
      document.getElementById("clear-btn").disabled = count === 0;
    }

    function updateSidebar() {
      const entries = Array.from(selectedNames.entries())
        .map(([id, name]) => ({
          id,
          name,
          meta: selectedMeta.get(id) || {}
        }))
        .sort((a, b) => a.name.localeCompare(b.name, "nl"));

      selectionCountEl.textContent = `${entries.length} selected`;
      selectionListEl.innerHTML = "";

      for (const entry of entries) {
        const li = document.createElement("li");

        const nameDiv = document.createElement("div");
        nameDiv.className = "buurt-name";
        nameDiv.textContent = entry.name;

        const metaDiv = document.createElement("div");
        metaDiv.className = "meta";
        metaDiv.textContent =
          `updated by ${entry.meta.updatedBy || "Unknown"}` +
          (entry.meta.updatedAt ? ` • ${formatTimestamp(entry.meta.updatedAt)}` : "");

        li.appendChild(nameDiv);
        li.appendChild(metaDiv);
        selectionListEl.appendChild(li);
      }

      updateButtons(entries.length);
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    function exportSelectedGeoJSON() {
      const features = Array.from(selectedFeatures.values());
      const geojson = {
        type: "FeatureCollection",
        features
      };

      downloadFile(
        "selected_buurten.geojson",
        JSON.stringify(geojson, null, 2),
        "application/geo+json"
      );
    }

    function exportSelectedNames() {
      const names = Array.from(selectedNames.values()).sort((a, b) => a.localeCompare(b, "nl"));
      downloadFile(
        "selected_buurten.txt",
        names.join("\n"),
        "text/plain;charset=utf-8"
      );
    }

    function clearVisualSelectionsOnly() {
      for (const id of Array.from(selectedIds)) {
        const layer = layerById.get(id);
        if (layer) {
          applyStyle(layer, false);
        }
      }

      selectedIds.clear();
      selectedNames.clear();
      selectedFeatures.clear();
      selectedMeta.clear();
    }

    function applyRemoteSelectionData(data) {
      if (!buurtenLoaded) {
        pendingRemoteData = data;
        return;
      }

      clearVisualSelectionsOnly();

      for (const [featureId, value] of Object.entries(data || {})) {
        const layer = layerById.get(featureId);
        const feature = featureById.get(featureId);
        if (!layer || !feature) continue;

        const featureName = getFeatureName(feature);

        selectedIds.add(featureId);
        selectedNames.set(featureId, featureName);
        selectedFeatures.set(featureId, JSON.parse(JSON.stringify(feature)));
        selectedMeta.set(featureId, {
          updatedBy: value?.updatedBy || "Unknown",
          updatedAt: value?.updatedAt || null
        });

        applyStyle(layer, true);
      }

      updateSidebar();
    }

    async function toggleFeatureInCloud(featureId) {
      const itemRef = ref(db, `maps/amsterdam/selectedBuurten/${featureId}`);

      if (selectedIds.has(featureId)) {
        await remove(itemRef);
      } else {
        await set(itemRef, {
          selected: true,
          updatedBy: getCurrentUserName(),
          updatedAt: Date.now()
        });
      }
    }

    async function clearAllSelectionsInCloud() {
      const snapshot = await get(selectionRef);
      const data = snapshot.val() || {};

      const ops = Object.keys(data).map((id) =>
        remove(ref(db, `maps/amsterdam/selectedBuurten/${id}`))
      );

      await Promise.all(ops);
    }

    async function importSelectedGeoJSONToCloud(file) {
      const text = await file.text();
      let geojson;

      try {
        geojson = JSON.parse(text);
      } catch {
        throw new Error("Invalid JSON file.");
      }

      if (!geojson || geojson.type !== "FeatureCollection" || !Array.isArray(geojson.features)) {
        throw new Error("Imported file is not a valid GeoJSON FeatureCollection.");
      }

      const writeOps = [];

      for (const feature of geojson.features) {
        const featureId = getFeatureId(feature);
        if (!featureId || !layerById.has(featureId)) continue;

        writeOps.push(
          set(ref(db, `maps/amsterdam/selectedBuurten/${featureId}`), {
            selected: true,
            updatedBy: getCurrentUserName(),
            updatedAt: Date.now()
          })
        );
      }

      await Promise.all(writeOps);
    }

    document.getElementById("import-btn").addEventListener("click", () => {
      document.getElementById("import-file-input").click();
    });

    document.getElementById("import-file-input").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      event.target.value = "";

      if (!file) return;

      try {
        await importSelectedGeoJSONToCloud(file);
      } catch (error) {
        console.error("Import failed:", error);
        alert(error.message || "Import failed.");
      }
    });

    document.getElementById("export-json-btn").addEventListener("click", exportSelectedGeoJSON);
    document.getElementById("export-names-btn").addEventListener("click", exportSelectedNames);

    document.getElementById("clear-btn").addEventListener("click", async () => {
      try {
        await clearAllSelectionsInCloud();
      } catch (error) {
        console.error("Clear failed:", error);
        alert("Could not clear shared selections.");
      }
    });

    async function loadBuurten() {
      const response = await fetch("./data/buurten.geojson");
      if (!response.ok) {
        throw new Error(`Could not load local GeoJSON: HTTP ${response.status}`);
      }

      const data = await response.json();

      const buurtenLayer = L.geoJSON(data, {
        style: baseStyle,
        onEachFeature: (feature, layer) => {
          const featureId = getFeatureId(feature);
          const featureName = getFeatureName(feature);

          if (!featureId) return;

          layerById.set(featureId, layer);
          featureById.set(featureId, feature);

          layer.bindTooltip(featureName, {
            sticky: true,
            direction: "top",
            opacity: 0.95
          });

          layer.on("mouseover", () => {
            if (!selectedIds.has(featureId)) {
              layer.setStyle(hoverStyle());
            }
          });

          layer.on("mouseout", () => {
            applyStyle(layer, selectedIds.has(featureId));
          });

          layer.on("click", async () => {
            try {
              await toggleFeatureInCloud(featureId);
            } catch (error) {
              console.error("Toggle failed:", error);
              alert("Could not update shared selection.");
            }
          });
        }
      }).addTo(map);

      map.fitBounds(buurtenLayer.getBounds());
      buurtenLoaded = true;

      if (pendingRemoteData) {
        applyRemoteSelectionData(pendingRemoteData);
        pendingRemoteData = null;
      }

      liveStatusEl.textContent = "Connected";
    }

    onValue(
      selectionRef,
      (snapshot) => {
        const data = snapshot.val() || {};
        applyRemoteSelectionData(data);
        liveStatusEl.textContent = "Connected";
      },
      (error) => {
        console.error("Realtime listener error:", error);
        liveStatusEl.textContent = "Connection error";
      }
    );

    loadBuurten().catch((error) => {
      console.error(error);
      liveStatusEl.textContent = "Load error";
      alert(
        "Could not load ./data/buurten.geojson. Make sure the file exists in your GitHub repo."
      );
    });
  </script>
</body>
</html>
