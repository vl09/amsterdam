<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amsterdam Buurten Selector</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css?v=13" />
</head>
<body>
  <div id="map"></div>

  <div class="info-box">
    <div class="info-box-header">
      <h3>Selected buurten</h3>

      <div class="identity-row">
        <span>You: <strong id="display-name-label"></strong></span>
        <button type="button" class="small" id="change-name-btn">Change name</button>
      </div>

      <div class="sync-line" id="sync-line">Loading…</div>

      <div id="selection-count">0 selected</div>

      <div class="controls">
        <button type="button" id="import-btn">Import GeoJSON</button>
        <button type="button" id="export-json-btn" disabled>Export GeoJSON</button>
        <button type="button" id="export-names-btn" disabled>Export names</button>
        <button type="button" id="clear-btn" class="secondary" disabled>Delete all</button>
      </div>
    </div>

    <div class="info-box-list-wrap">
      <div class="sort-row">
        <label for="sort-select">Sort</label>
        <select id="sort-select" aria-label="Sort buurten list">
          <option value="name">Name A–Z</option>
          <option value="name_desc">Name Z–A</option>
          <option value="upvotes">Upvotes (high first)</option>
          <option value="downvotes">Downvotes (high first)</option>
          <option value="net">Net score (high first)</option>
        </select>
      </div>
      <ul id="selection-list"></ul>
    </div>
  </div>

  <div id="name-modal" class="modal-overlay" hidden>
    <div class="modal-box" role="dialog" aria-labelledby="name-modal-title">
      <h2 id="name-modal-title">Your name</h2>
      <p>This name is shown when you change the shared map. It is stored only in this browser.</p>
      <input type="text" id="name-input" maxlength="80" placeholder="e.g. Valentijn" autocomplete="nickname" />
      <div class="modal-actions">
        <button type="button" class="secondary" id="name-cancel-btn">Cancel</button>
        <button type="button" id="name-save-btn">Save</button>
      </div>
    </div>
  </div>

  <div id="vote-modal" class="modal-overlay vote-modal-overlay" hidden>
    <div class="modal-box vote-modal-box" role="dialog" aria-labelledby="vote-modal-buurt">
      <div class="vote-modal-head">
        <h2 id="vote-modal-buurt" class="vote-modal-buurt-title"></h2>
        <button type="button" class="vote-modal-close-x" id="vote-m-close" aria-label="Close">×</button>
      </div>
      <div class="vote-modal-actions">
        <button type="button" class="vote-btn vote-arrow vote-up vote-muted" id="vote-m-up" title="Upvote — tap again to remove" aria-label="Upvote">↑</button>
        <button type="button" class="vote-btn vote-arrow vote-down vote-muted" id="vote-m-down" title="Downvote — tap again to remove" aria-label="Downvote">↓</button>
      </div>
    </div>
  </div>

  <div id="buurt-info-modal" class="modal-overlay" hidden>
    <div class="modal-box modal-box-wide" role="dialog" aria-labelledby="buurt-info-title">
      <h2 id="buurt-info-title"></h2>
      <dl class="buurt-info-stats">
        <dt>Net score</dt>
        <dd id="buurt-info-net"></dd>
        <dt>Total upvotes</dt>
        <dd id="buurt-info-up"></dd>
        <dt>Total downvotes</dt>
        <dd id="buurt-info-down"></dd>
      </dl>
      <h3 class="buurt-info-subh">People who voted</h3>
      <ul id="buurt-info-voters" class="buurt-info-voter-list"></ul>
      <p id="buurt-info-no-voters" class="buurt-info-empty" hidden>No votes yet.</p>
      <div class="modal-actions buurt-info-actions">
        <button type="button" class="secondary" id="buurt-info-remove">Remove from list</button>
        <button type="button" id="buurt-info-close">Close</button>
      </div>
    </div>
  </div>

  <input
    id="import-file-input"
    type="file"
    accept=".geojson,.json,application/geo+json,application/json"
    style="display:none"
  />

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
    import { getAnalytics } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js';
    import {
      getFirestore,
      collection,
      doc,
      onSnapshot,
      writeBatch,
      getDocs,
      getDoc,
      deleteField,
      serverTimestamp,
      runTransaction
    } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

    void (function bootstrapAmsterdamBuurten() {
      if (typeof window !== 'undefined' && window.__amsterdamBuurtenAppStarted) {
        return;
      }
      if (typeof window !== 'undefined') {
        window.__amsterdamBuurtenAppStarted = true;
      }

      const mapEl = document.getElementById('map');
      if (!mapEl || mapEl._leaflet_id) {
        return;
      }

    /**
     * Firestore: create DB in Firebase Console. If saves never persist, open DevTools → Console
     * for errors; most often rules block writes. Example (development only — tighten for production):
     *
     * match /buurten_collab/{document=**} {
     *   allow read, write: if true;
     * }
     *
     * Web API keys are public; security is enforced by rules (and App Check if enabled).
     */
    const firebaseConfig = {
      apiKey: 'AIzaSyDPoRRQic5DNcNL3MJzwW5ex13GRGBMnCg',
      authDomain: 'amsterdam-buurten.firebaseapp.com',
      projectId: 'amsterdam-buurten',
      storageBucket: 'amsterdam-buurten.firebasestorage.app',
      messagingSenderId: '684638441503',
      appId: '1:684638441503:web:06ae83f3ab571f4955c52a',
      measurementId: 'G-408J4KXF9S'
    };

    const app = initializeApp(firebaseConfig);
    try {
      getAnalytics(app);
    } catch (e) {
      console.warn('Firebase Analytics unavailable', e);
    }

    let db = null;
    try {
      db = getFirestore(app);
    } catch (e) {
      console.error('Firebase init failed', e);
    }
    const firestoreActive = !!db;

    const COLLAB_COLLECTION = 'buurten_collab';
    const META_DOC_ID = '_meta';
    const LOCAL_STORAGE_KEY = 'buurten_local_selection_v1';
    const NAME_STORAGE_KEY = 'buurten_display_name';
    const SORT_STORAGE_KEY = 'buurten_list_sort';

    const map = L.map(mapEl).setView([52.3728, 4.8936], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function invalidateMapSize() {
      try {
        map.invalidateSize({ animate: false });
      } catch (e) {}
    }
    requestAnimationFrame(invalidateMapSize);
    window.addEventListener('resize', invalidateMapSize);
    window.addEventListener('orientationchange', function() {
      window.setTimeout(invalidateMapSize, 350);
    });

    const selectedIds = new Set();
    const selectedNames = new Map();
    const selectedFeatures = new Map();
    /** Per buurt: aggregate tallies from all users (live from Firestore). */
    const voteCountsById = new Map();
    /** Current user's vote for each selected buurt: 1 | -1 | 0 */
    const myVoteById = new Map();
    /** Encoded key → 1 | -1 per buurt (from Firestore), for info modal */
    const votersById = new Map();
    const layerById = new Map();

    let displayName = localStorage.getItem(NAME_STORAGE_KEY) || '';
    let layersReady = false;
    let unsubCollab = null;
    /** While a write is in flight, snapshots must not undo optimistic UI (commit often hangs or is slow). */
    const pendingOutgoingAdd = new Set();
    const pendingOutgoingDelete = new Set();
    /** Net score (up − down) per buurt id from Firestore, for heatmap; buurten without docs → 0 */
    const voteNetById = new Map();
    let voteModalBuurtId = null;
    let buurtInfoModalId = null;

    function getFeatureId(feature) {
      return (
        feature.properties?.identificatie ||
        feature.properties?.id ||
        feature.properties?.code ||
        feature.properties?.volgnummer ||
        feature.properties?.naam
      );
    }

    function getFeatureName(feature) {
      return (
        feature.properties?.naam ||
        feature.properties?.name ||
        'Onbekende buurt'
      );
    }

    function toFirestoreDocId(featureId) {
      return encodeURIComponent(String(featureId));
    }

    function fromFirestoreDocId(docId) {
      return decodeURIComponent(docId);
    }

    function voterLabelFromKey(encodedKey) {
      try {
        return decodeURIComponent(encodedKey);
      } catch {
        return encodedKey;
      }
    }

    function voterMapKey(name) {
      return encodeURIComponent(String(name || 'Anonymous'));
    }

    function normalizeVotersObject(raw) {
      const out = {};
      if (!raw || typeof raw !== 'object') return out;
      for (const k of Object.keys(raw)) {
        const v = raw[k];
        if (v === 1 || v === -1) out[k] = v;
      }
      return out;
    }

    function talliesFromVoters(voters) {
      let up = 0;
      let down = 0;
      for (const v of Object.values(voters)) {
        if (v === 1) up += 1;
        else if (v === -1) down += 1;
      }
      return { up, down };
    }

    /**
     * prev: 1 | -1 | 0; direction: 'up' | 'down'
     * Same arrow again removes your vote (0). Opposite arrow switches sign.
     */
    function computeNextVote(prev, direction) {
      if (direction === 'up') {
        if (prev === 1) return 0;
        return 1;
      }
      if (prev === -1) return 0;
      return -1;
    }

    function applyVoteStateFromDocData(featureId, data) {
      const voteBlock = parseVotePayloadFromDoc(data || {});
      voteCountsById.set(featureId, { up: voteBlock.up, down: voteBlock.down });
      votersById.set(featureId, Object.assign({}, voteBlock.voters));
      const vk = voterMapKey(displayName);
      const mv = voteBlock.voters[vk];
      myVoteById.set(featureId, mv === 1 ? 1 : mv === -1 ? -1 : 0);
      voteNetById.set(featureId, voteBlock.up - voteBlock.down);
    }

    function heatmapFillFromNet(net) {
      const n = typeof net === 'number' ? net : 0;
      if (n > 0) {
        return { fillColor: '#22c55e', fillOpacity: 0.22 + Math.min(0.38, n * 0.05) };
      }
      if (n < 0) {
        return { fillColor: '#dc2626', fillOpacity: 0.22 + Math.min(0.38, Math.abs(n) * 0.05) };
      }
      return { fillColor: '#fb923c', fillOpacity: 0.26 };
    }

    /** Community net &gt; 0 but this user has not up/downvoted yet — lighter mint */
    function heatmapFillPositiveCommunityOnly(hover) {
      return {
        fillColor: '#bbf7d0',
        fillOpacity: hover ? 0.42 : 0.3
      };
    }

    /** Default look: not in your list, no net community score — still clickable */
    function neutralSelectableFill(hover) {
      return {
        fillColor: '#9ca3af',
        fillOpacity: hover ? 0.34 : 0.22
      };
    }

    function pathStyleForFeatureId(featureId, opts) {
      opts = opts || {};
      if (featureId == null || featureId === '') {
        return Object.assign({}, neutralSelectableFill(false), {
          color: '#4b5563',
          weight: 1,
          opacity: 0.95
        });
      }
      const hover = opts.hover === true;
      const net = voteNetById.has(featureId) ? voteNetById.get(featureId) : 0;
      const selected = selectedIds.has(featureId);
      const my = myVoteById.get(featureId);
      const myV = my === 1 || my === -1 ? my : 0;
      let fill;
      if (!selected && net === 0) {
        fill = neutralSelectableFill(hover);
      } else if (net > 0 && (!selected || myV === 0)) {
        fill = heatmapFillPositiveCommunityOnly(hover);
      } else {
        fill = heatmapFillFromNet(net);
      }
      return Object.assign({}, fill, {
        color: selected ? '#b91c1c' : '#4b5563',
        weight: hover ? 2 : selected ? 3 : 1,
        opacity: 0.95
      });
    }

    function paintLayerById(featureId) {
      const layer = layerById.get(featureId);
      if (layer) {
        layer.setStyle(pathStyleForFeatureId(featureId, { hover: false }));
      }
    }

    function refreshAllHeatmapStyles() {
      for (const fid of layerById.keys()) {
        paintLayerById(fid);
      }
    }

    function populateVoteNetFromDocs(docs) {
      voteNetById.clear();
      for (const d of docs) {
        const id = fromFirestoreDocId(d.id);
        const data = d.data() || {};
        const block = parseVotePayloadFromDoc(data);
        voteNetById.set(id, block.up - block.down);
      }
    }

    function formatTime(ts) {
      if (!ts || typeof ts.toDate !== 'function') return '';
      try {
        return ts.toDate().toLocaleString();
      } catch {
        return '';
      }
    }

    function setSyncLine(text) {
      document.getElementById('sync-line').textContent = text;
    }

    function updateDisplayNameUI() {
      const el = document.getElementById('display-name-label');
      if (el) {
        el.textContent = displayName || '(not set)';
      }
    }

    function openNameModal(isRequired) {
      const modal = document.getElementById('name-modal');
      const input = document.getElementById('name-input');
      input.value = displayName || '';
      modal.hidden = false;
      input.focus();
      modal.dataset.required = isRequired ? '1' : '0';
      document.getElementById('name-cancel-btn').style.display = isRequired ? 'none' : 'inline-block';
    }

    function closeNameModal() {
      document.getElementById('name-modal').hidden = true;
    }

    function saveNameFromModal() {
      const v = document.getElementById('name-input').value.trim() || 'Anonymous';
      displayName = v;
      try {
        localStorage.setItem(NAME_STORAGE_KEY, displayName);
      } catch (e) {
        console.warn(e);
        alert('Could not save your name (browser storage blocked or full).');
      }
      updateDisplayNameUI();
      closeNameModal();
    }

    document.getElementById('change-name-btn').addEventListener('click', function() {
      openNameModal(false);
    });

    document.getElementById('name-save-btn').addEventListener('click', saveNameFromModal);

    document.getElementById('name-cancel-btn').addEventListener('click', closeNameModal);

    document.getElementById('name-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveNameFromModal();
    });

    document.getElementById('vote-m-up').addEventListener('click', function() {
      if (voteModalBuurtId != null) {
        applyVoteToggle(voteModalBuurtId, 'up');
      }
    });
    document.getElementById('vote-m-down').addEventListener('click', function() {
      if (voteModalBuurtId != null) {
        applyVoteToggle(voteModalBuurtId, 'down');
      }
    });
    document.getElementById('vote-m-close').addEventListener('click', closeVoteModal);

    document.getElementById('buurt-info-close').addEventListener('click', closeBuurtInfoModal);
    document.getElementById('buurt-info-remove').addEventListener('click', function() {
      if (buurtInfoModalId != null) {
        removeBuurtFromCloud(buurtInfoModalId);
      }
    });

    function bindBackdropClose(overlayId, closeFn) {
      const el = document.getElementById(overlayId);
      if (!el) return;
      el.addEventListener('click', function(e) {
        if (e.target === el) closeFn();
      });
    }
    bindBackdropClose('name-modal', closeNameModal);
    bindBackdropClose('vote-modal', closeVoteModal);
    bindBackdropClose('buurt-info-modal', closeBuurtInfoModal);

    function ensureDisplayName() {
      if (!displayName) {
        openNameModal(true);
      }
    }

    /** True if we have a non-empty offline backup of selections (used when Firestore is empty and _meta does not exist yet). */
    function localStorageHasSelectionBackup() {
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        return Array.isArray(data.entries) && data.entries.length > 0;
      } catch {
        return false;
      }
    }

    function firestoreErrorMessage(err) {
      const code = err && err.code ? err.code : '';
      const msg = err && err.message ? err.message : String(err);
      if (code === 'permission-denied') {
        if (
          /Cloud Firestore API has not been used|Firestore API has not been used|API has not been used in project|is disabled/i.test(
            msg
          )
        ) {
          return (
            'The Cloud Firestore API is disabled or Firestore is not set up for this Firebase project.\n\n' +
            '1) Open Google Cloud Console and enable the API for project amsterdam-buurten:\n' +
            '   https://console.developers.google.com/apis/api/firestore.googleapis.com/overview?project=amsterdam-buurten\n' +
            '   Click Enable, then wait a few minutes.\n\n' +
            '2) In Firebase Console → Build → Firestore Database, create the database if you have not yet (start in production or test mode).\n\n' +
            '3) Then deploy Firestore security rules (see firestore.rules in the repo) or paste rules in Firebase → Firestore → Rules.\n\n' +
            'Original error: ' +
            msg
          );
        }
        return (
          'Firestore returned permission denied. This is often either:\n' +
          'A) Security rules: Firebase Console → Firestore → Rules — allow access to buurten_collab, e.g.:\n' +
          "   match /buurten_collab/{document=**} { allow read, write: if true; }\n\n" +
          'B) Cloud Firestore API disabled: enable it for the project (same link as in the Firebase error in the console).\n\n' +
          'Original error: ' +
          msg
        );
      }
      return msg + (code ? ' (' + code + ')' : '');
    }

    // Show saved name as soon as the script runs (do not wait for GeoJSON).
    updateDisplayNameUI();

    function updateButtons(count) {
      document.getElementById('export-json-btn').disabled = count === 0;
      document.getElementById('export-names-btn').disabled = count === 0;
      document.getElementById('clear-btn').disabled = count === 0;
    }

    function populateBuurtInfoModal(featureId) {
      const name = selectedNames.get(featureId) || '';
      const c = voteCountsById.get(featureId) || { up: 0, down: 0 };
      const net = c.up - c.down;
      document.getElementById('buurt-info-title').textContent = name || 'Buurt';
      document.getElementById('buurt-info-net').textContent = String(net);
      document.getElementById('buurt-info-up').textContent = String(c.up);
      document.getElementById('buurt-info-down').textContent = String(c.down);
      const voters = votersById.get(featureId) || {};
      const ul = document.getElementById('buurt-info-voters');
      const emptyEl = document.getElementById('buurt-info-no-voters');
      ul.innerHTML = '';
      const keys = Object.keys(voters).filter(function(k) {
        const v = voters[k];
        return v === 1 || v === -1;
      });
      keys.sort(function(a, b) {
        return voterLabelFromKey(a).localeCompare(voterLabelFromKey(b));
      });
      if (keys.length === 0) {
        emptyEl.hidden = false;
      } else {
        emptyEl.hidden = true;
        for (let i = 0; i < keys.length; i += 1) {
          const k = keys[i];
          const li = document.createElement('li');
          const arrow = voters[k] === 1 ? '\u2191' : '\u2193';
          li.textContent = voterLabelFromKey(k) + ' \u2014 ' + arrow;
          ul.appendChild(li);
        }
      }
    }

    function openBuurtInfoModal(featureId) {
      buurtInfoModalId = featureId;
      populateBuurtInfoModal(featureId);
      document.getElementById('buurt-info-modal').hidden = false;
    }

    function closeBuurtInfoModal() {
      buurtInfoModalId = null;
      document.getElementById('buurt-info-modal').hidden = true;
    }

    function refreshBuurtInfoModalIfOpen() {
      if (buurtInfoModalId == null) return;
      const modal = document.getElementById('buurt-info-modal');
      if (modal.hidden) return;
      if (!selectedIds.has(buurtInfoModalId)) {
        closeBuurtInfoModal();
        return;
      }
      populateBuurtInfoModal(buurtInfoModalId);
    }

    function sortSelectedEntries(entries) {
      const sel = document.getElementById('sort-select');
      const mode = sel && sel.value ? sel.value : 'name';
      const byName = function(a, b) {
        return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
      };
      const list = entries.slice();
      switch (mode) {
        case 'name_desc':
          list.sort(function(a, b) {
            return byName(b, a);
          });
          break;
        case 'upvotes':
          list.sort(function(a, b) {
            if (b.up !== a.up) return b.up - a.up;
            return byName(a, b);
          });
          break;
        case 'downvotes':
          list.sort(function(a, b) {
            if (b.down !== a.down) return b.down - a.down;
            return byName(a, b);
          });
          break;
        case 'net':
          list.sort(function(a, b) {
            if (b.net !== a.net) return b.net - a.net;
            return byName(a, b);
          });
          break;
        default:
          list.sort(byName);
      }
      return list;
    }

    function updateSidebar() {
      const entries = sortSelectedEntries(
        Array.from(selectedNames.entries()).map(([id, name]) => {
          const c = voteCountsById.get(id) || { up: 0, down: 0 };
          const my = myVoteById.get(id) || 0;
          const net = c.up - c.down;
          return { id, name, up: c.up, down: c.down, my, net };
        })
      );

      document.getElementById('selection-count').textContent = `${entries.length} selected`;

      const ul = document.getElementById('selection-list');
      ul.innerHTML = '';

      for (const entry of entries) {
        const li = document.createElement('li');

        const nameSpan = document.createElement('span');
        nameSpan.className = 'li-name';
        nameSpan.textContent = entry.name;
        li.appendChild(nameSpan);

        if (firestoreActive) {
          const strip = document.createElement('div');
          strip.className = 'li-vote-strip';

          const upBtn = document.createElement('button');
          upBtn.type = 'button';
          upBtn.className =
            'vote-btn vote-arrow vote-up' + (entry.my === 1 ? ' vote-active' : ' vote-muted');
          upBtn.textContent = '\u2191';
          upBtn.title = 'Upvote — click again to remove your vote';
          upBtn.setAttribute('aria-label', 'Upvote');
          upBtn.addEventListener('click', function() {
            ensureDisplayName();
            applyVoteToggle(entry.id, 'up');
          });
          strip.appendChild(upBtn);

          const netSpan = document.createElement('span');
          netSpan.className = 'vote-net';
          netSpan.textContent = String(entry.net);
          strip.appendChild(netSpan);

          const downBtn = document.createElement('button');
          downBtn.type = 'button';
          downBtn.className =
            'vote-btn vote-arrow vote-down' + (entry.my === -1 ? ' vote-active' : ' vote-muted');
          downBtn.textContent = '\u2193';
          downBtn.title = 'Downvote — click again to remove your vote';
          downBtn.setAttribute('aria-label', 'Downvote');
          downBtn.addEventListener('click', function() {
            ensureDisplayName();
            applyVoteToggle(entry.id, 'down');
          });
          strip.appendChild(downBtn);

          const infoBtn = document.createElement('button');
          infoBtn.type = 'button';
          infoBtn.className = 'btn-info-buurt';
          infoBtn.textContent = 'i';
          infoBtn.title = 'Details and remove';
          infoBtn.setAttribute('aria-label', 'Buurt details');
          infoBtn.addEventListener('click', function() {
            openBuurtInfoModal(entry.id);
          });
          strip.appendChild(infoBtn);

          li.appendChild(strip);
        }

        ul.appendChild(li);
      }

      updateButtons(entries.length);
      refreshBuurtInfoModalIfOpen();
      syncVoteModalButtonStyles();
    }

    function syncVoteModalButtonStyles() {
      const modal = document.getElementById('vote-modal');
      if (!modal || modal.hidden || voteModalBuurtId == null) return;
      const my = myVoteById.get(voteModalBuurtId) || 0;
      const upEl = document.getElementById('vote-m-up');
      const downEl = document.getElementById('vote-m-down');
      if (!upEl || !downEl) return;
      upEl.className =
        'vote-btn vote-arrow vote-up' + (my === 1 ? ' vote-active' : ' vote-muted');
      downEl.className =
        'vote-btn vote-arrow vote-down' + (my === -1 ? ' vote-active' : ' vote-muted');
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    function applySelectLocal(featureId, featureName, feature) {
      const layer = layerById.get(featureId);
      if (!layer) {
        return false;
      }

      selectedIds.add(featureId);
      selectedNames.set(featureId, featureName);
      selectedFeatures.set(featureId, JSON.parse(JSON.stringify(feature)));
      if (!voteCountsById.has(featureId)) voteCountsById.set(featureId, { up: 0, down: 0 });
      if (!myVoteById.has(featureId)) myVoteById.set(featureId, 0);
      paintLayerById(featureId);
      return true;
    }

    function applyDeselectLocal(featureId) {
      const layer = layerById.get(featureId);
      if (layer) {
        paintLayerById(featureId);
      }
      selectedIds.delete(featureId);
      selectedNames.delete(featureId);
      selectedFeatures.delete(featureId);
      voteCountsById.delete(featureId);
      myVoteById.delete(featureId);
      votersById.delete(featureId);
    }

    function persistLocalSelection() {
      const entries = [];
      for (const id of selectedIds) {
        const c = voteCountsById.get(id) || { up: 0, down: 0 };
        entries.push({
          id,
          name: selectedNames.get(id) || '',
          upvotes: c.up,
          downvotes: c.down
        });
      }
      try {
        localStorage.setItem(
          LOCAL_STORAGE_KEY,
          JSON.stringify({ v: 2, entries: entries })
        );
      } catch (e) {
        console.warn('Could not save local selection', e);
      }
    }

    function restoreLocalSelection() {
      let raw;
      try {
        raw = localStorage.getItem(LOCAL_STORAGE_KEY);
      } catch {
        return;
      }
      if (!raw) return;
      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        return;
      }
      if (!data.entries || !Array.isArray(data.entries)) return;

      const isV2 =
        data.v === 2 ||
        (data.entries.length > 0 && !data.entries[0].feature);

      for (const e of data.entries) {
        if (!e.id) continue;
        const layer = layerById.get(e.id);
        if (isV2) {
          if (layer && layer.feature) {
            applySelectLocal(
              e.id,
              e.name || getFeatureName(layer.feature),
              layer.feature
            );
            const up =
              typeof e.upvotes === 'number'
                ? e.upvotes
                : typeof e.votes === 'number'
                  ? e.votes
                  : 0;
            const down = typeof e.downvotes === 'number' ? e.downvotes : 0;
            voteCountsById.set(e.id, { up, down });
            myVoteById.set(e.id, 0);
          }
        } else if (e.feature) {
          applySelectLocal(e.id, e.name || getFeatureName(e.feature), e.feature);
          const up =
            typeof e.upvotes === 'number'
              ? e.upvotes
              : typeof e.votes === 'number'
                ? e.votes
                : 0;
          const down = typeof e.downvotes === 'number' ? e.downvotes : 0;
          voteCountsById.set(e.id, { up, down });
          myVoteById.set(e.id, 0);
        }
      }
      updateSidebar();
      persistLocalSelection();
    }

    function parseVotePayloadFromDoc(data) {
      const voters = normalizeVotersObject(data.voters);
      if (Object.keys(voters).length > 0) {
        const t = talliesFromVoters(voters);
        return { up: t.up, down: t.down, voters };
      }
      const hasUp = typeof data.upvotes === 'number';
      const hasDown = typeof data.downvotes === 'number';
      let up = hasUp ? data.upvotes : 0;
      let down = hasDown ? data.downvotes : 0;
      if (typeof data.votes === 'number' && !hasUp && !hasDown) {
        up = data.votes;
      }
      return { up, down, voters };
    }

    function applySnapshotToMap(docs) {
      const nextIds = new Set();

      for (const d of docs) {
        const id = fromFirestoreDocId(d.id);
        if (pendingOutgoingDelete.has(id)) {
          continue;
        }
        const data = d.data() || {};
        let feature;
        try {
          feature = data.featureJson ? JSON.parse(data.featureJson) : null;
        } catch {
          feature = null;
        }
        if (!feature) continue;

        nextIds.add(id);
        const name = data.name || getFeatureName(feature);
        applyVoteStateFromDocData(id, data);

        if (!selectedIds.has(id)) {
          applySelectLocal(id, name, feature);
        } else {
          selectedNames.set(id, name);
          selectedFeatures.set(id, JSON.parse(JSON.stringify(feature)));
          const layer = layerById.get(id);
          if (layer) paintLayerById(id);
        }
      }

      for (const id of Array.from(selectedIds)) {
        if (!nextIds.has(id) && !pendingOutgoingAdd.has(id)) {
          applyDeselectLocal(id);
        }
      }

      updateSidebar();
      persistLocalSelection();
      refreshAllHeatmapStyles();
    }

    function subscribeCollaboration() {
      if (!db) return;

      unsubCollab = onSnapshot(
        collection(db, COLLAB_COLLECTION),
        function(snapshot) {
          const selectionDocs = [];
          let metaData = null;

          snapshot.forEach(function(docSnap) {
            if (docSnap.id === META_DOC_ID) {
              metaData = docSnap.data();
            } else {
              selectionDocs.push(docSnap);
            }
          });

          if (metaData) {
            const who = metaData.lastUpdatedBy || 'Someone';
            const when = formatTime(metaData.lastUpdatedAt);
            const action = metaData.lastAction ? ` · ${metaData.lastAction}` : '';
            setSyncLine(
              when
                ? `Live sync · Last update by ${who}${action} · ${when}`
                : `Live sync · Last update by ${who}${action}`
            );
          } else {
            setSyncLine('Live sync · No activity yet');
          }

          if (layersReady) {
            if (selectionDocs.length === 0 && !metaData && localStorageHasSelectionBackup()) {
              restoreLocalSelection();
              if (firestoreActive && selectedIds.size > 0) {
                syncLocalSelectionToFirestore().catch(function(e) {
                  console.error(e);
                  setSyncLine('Could not sync restored selection — ' + (e && e.code ? e.code : 'error'));
                  alert('Could not upload restored selection to the cloud.\n\n' + firestoreErrorMessage(e));
                });
              }
            } else {
              populateVoteNetFromDocs(selectionDocs);
              applySnapshotToMap(selectionDocs);
            }
          }
        },
        function(err) {
          console.error('Firestore listener error', err);
          setSyncLine('Sync error — check console / Firebase config');
        }
      );
    }

    function writeMeta(batch, actionLabel) {
      const ref = doc(db, COLLAB_COLLECTION, META_DOC_ID);
      batch.set(
        ref,
        {
          lastUpdatedBy: displayName || 'Anonymous',
          lastUpdatedAt: serverTimestamp(),
          lastAction: actionLabel
        },
        { merge: true }
      );
    }

    /**
     * Push all current in-memory selections to Firestore so the server matches the UI.
     * Required after restoring from localStorage while Firestore was empty; otherwise the next
     * snapshot only contains the buurten touched by the first click and wipes the rest.
     */
    function syncLocalSelectionToFirestore() {
      if (!db || selectedIds.size === 0) {
        return Promise.resolve();
      }
      const ids = Array.from(selectedIds);
      const who = displayName || 'Anonymous';
      const ts = serverTimestamp();

      const p = new Promise(function(resolve, reject) {
        function commitChunk(start) {
          const batch = writeBatch(db);
          const end = Math.min(start + 400, ids.length);
          for (let i = start; i < end; i += 1) {
            const id = ids[i];
            const feature = selectedFeatures.get(id);
            const name = selectedNames.get(id) || '';
            if (!feature) continue;
            const docId = toFirestoreDocId(id);
            const ref = doc(db, COLLAB_COLLECTION, docId);
            batch.set(
              ref,
              {
                name: name,
                featureJson: JSON.stringify(JSON.parse(JSON.stringify(feature))),
                updatedBy: who,
                updatedAt: ts
              },
              { merge: true }
            );
          }
          writeMeta(batch, 'sync local backup');
          batch
            .commit()
            .then(function() {
              if (end < ids.length) {
                commitChunk(end);
              } else {
                resolve();
              }
            })
            .catch(reject);
        }
        commitChunk(0);
      });

      return p;
    }

    function commitWithTimeout(commitPromise, ms) {
      return Promise.race([
        commitPromise,
        new Promise(function(_, reject) {
          window.setTimeout(function() {
            reject(new Error('Firestore commit timed out after ' + ms + 'ms'));
          }, ms);
        })
      ]);
    }

    function addBuurtWithInitialUpvote(featureId, featureName, feature) {
      if (!db) return;
      ensureDisplayName();

      const docId = toFirestoreDocId(featureId);
      const ref = doc(db, COLLAB_COLLECTION, docId);
      const batch = writeBatch(db);
      const vkey = voterMapKey(displayName);
      const voters = {};
      voters[vkey] = 1;
      const featCopy = JSON.parse(JSON.stringify(feature));
      batch.set(ref, {
        name: featureName,
        featureJson: JSON.stringify(featCopy),
        upvotes: 1,
        downvotes: 0,
        voters: voters,
        updatedBy: displayName || 'Anonymous',
        updatedAt: serverTimestamp()
      });
      writeMeta(batch, 'added buurt + upvote');
      pendingOutgoingAdd.add(featureId);
      applySelectLocal(featureId, featureName, feature);
      voteCountsById.set(featureId, { up: 1, down: 0 });
      myVoteById.set(featureId, 1);
      votersById.set(featureId, Object.assign({}, voters));
      voteNetById.set(featureId, 1);
      persistLocalSelection();
      updateSidebar();
      refreshAllHeatmapStyles();

      function clearPending() {
        pendingOutgoingAdd.delete(featureId);
      }

      function revertOptimistic() {
        applyDeselectLocal(featureId);
        voteNetById.delete(featureId);
        persistLocalSelection();
        updateSidebar();
        refreshAllHeatmapStyles();
      }

      commitWithTimeout(batch.commit(), 30000)
        .then(function() {
          clearPending();
        })
        .catch(function(e) {
          console.error(e);
          clearPending();
          revertOptimistic();
          setSyncLine('Save failed — ' + (e && e.message ? e.message : e && e.code ? e.code : 'error'));
          alert('Could not save to the cloud.\n\n' + firestoreErrorMessage(e));
        });
    }

    function removeBuurtFromCloud(featureId) {
      if (!db) return;
      if (buurtInfoModalId === featureId) {
        closeBuurtInfoModal();
      }
      ensureDisplayName();
      const feature = selectedFeatures.get(featureId);
      const featureName = selectedNames.get(featureId) || '';
      if (!feature) return;

      const docId = toFirestoreDocId(featureId);
      const ref = doc(db, COLLAB_COLLECTION, docId);
      const batch = writeBatch(db);
      batch.delete(ref);
      writeMeta(batch, 'removed buurt');
      pendingOutgoingDelete.add(featureId);
      applyDeselectLocal(featureId);
      persistLocalSelection();
      updateSidebar();
      refreshAllHeatmapStyles();

      function clearPending() {
        pendingOutgoingDelete.delete(featureId);
      }

      function revertOptimistic() {
        applySelectLocal(featureId, featureName, feature);
        persistLocalSelection();
        updateSidebar();
        refreshAllHeatmapStyles();
      }

      commitWithTimeout(batch.commit(), 30000)
        .then(function() {
          clearPending();
        })
        .catch(function(e) {
          console.error(e);
          clearPending();
          revertOptimistic();
          setSyncLine('Save failed — ' + (e && e.message ? e.message : e && e.code ? e.code : 'error'));
          alert('Could not save to the cloud.\n\n' + firestoreErrorMessage(e));
        });
    }

    function openVoteModal(featureId, featureName) {

    function applyVoteToggle(featureId, direction) {
      if (!db) return;
      ensureDisplayName();
      const docId = toFirestoreDocId(featureId);
      const ref = doc(db, COLLAB_COLLECTION, docId);
      const vkey = voterMapKey(displayName);
      const self = displayName || 'Anonymous';

      runTransaction(db, function(transaction) {
        return transaction.get(ref).then(function(snap) {
          if (!snap.exists) {
            throw new Error('Select this buurt on the map first so it exists in the cloud.');
          }
          const data = snap.data() || {};
          const voters = normalizeVotersObject(data.voters);
          const prev =
            typeof voters[vkey] === 'number' && (voters[vkey] === 1 || voters[vkey] === -1)
              ? voters[vkey]
              : 0;
          const next = computeNextVote(prev, direction);
          const nextVoters = Object.assign({}, voters);
          if (next === 0) delete nextVoters[vkey];
          else nextVoters[vkey] = next;
          const tallies = talliesFromVoters(nextVoters);
          /*
           * Do not use set(merge) with a full voters map: Firestore merges maps
           * recursively, so removed keys reappear. Use update + deleteField instead.
           */
          const voterFieldPath = 'voters.' + vkey;
          const payload = {
            upvotes: tallies.up,
            downvotes: tallies.down,
            updatedBy: self,
            updatedAt: serverTimestamp()
          };
          if (next === 0) {
            payload[voterFieldPath] = deleteField();
          } else {
            payload[voterFieldPath] = next;
          }
          transaction.update(ref, payload);
        });
      })
        .then(function() {
          const batch = writeBatch(db);
          writeMeta(batch, direction === 'up' ? 'vote up' : 'vote down');
          return batch.commit();
        })
        .then(function() {
          return getDoc(ref);
        })
        .then(function(snap) {
          if (!snap.exists) return;
          applyVoteStateFromDocData(featureId, snap.data());
          updateSidebar();
          syncVoteModalButtonStyles();
          refreshAllHeatmapStyles();
        })
        .catch(function(e) {
          console.error(e);
          alert('Vote failed.\n\n' + firestoreErrorMessage(e));
        });
    }

    function runBatchedDeletes(refs, onDone) {
      if (refs.length === 0) {
        if (onDone) onDone();
        return;
      }
      const chunk = refs.splice(0, 400);
      const batch = writeBatch(db);
      for (const r of chunk) {
        batch.delete(r);
      }
      writeMeta(batch, 'clear');
      batch
        .commit()
        .then(function() {
          runBatchedDeletes(refs, onDone);
        })
        .catch(function(e) {
          console.error(e);
          alert('Clear failed partway.');
        });
    }

    function importUpsertUpvoteOp(op) {
      const docId = toFirestoreDocId(op.featureId);
      const ref = doc(db, COLLAB_COLLECTION, docId);
      const vkey = voterMapKey(displayName);
      const self = displayName || 'Anonymous';
      const featJson = JSON.stringify(JSON.parse(JSON.stringify(op.feature)));

      return runTransaction(db, function(transaction) {
        return transaction.get(ref).then(function(snap) {
          if (!snap.exists) {
            const voters = {};
            voters[vkey] = 1;
            const tallies = talliesFromVoters(voters);
            transaction.set(ref, {
              name: op.featureName,
              featureJson: featJson,
              voters: voters,
              upvotes: tallies.up,
              downvotes: tallies.down,
              updatedBy: self,
              updatedAt: serverTimestamp()
            });
            return;
          }
          const data = snap.data() || {};
          const voters = normalizeVotersObject(data.voters);
          const nextVoters = Object.assign({}, voters);
          nextVoters[vkey] = 1;
          const tallies = talliesFromVoters(nextVoters);
          transaction.set(
            ref,
            {
              voters: nextVoters,
              upvotes: tallies.up,
              downvotes: tallies.down,
              updatedBy: self,
              updatedAt: serverTimestamp()
            },
            { merge: true }
          );
        });
      });
    }

    function clearAllSelections() {
      if (
        !confirm(
          'Delete all buurten from your list and the shared map?\n\n' +
            'This removes every selection and every vote document for everyone. This cannot be undone.'
        )
      ) {
        return;
      }

      ensureDisplayName();

      if (firestoreActive) {
        getDocs(collection(db, COLLAB_COLLECTION)).then(function(qs) {
          const refs = [];
          qs.forEach(function(d) {
            if (d.id !== META_DOC_ID) refs.push(d.ref);
          });
          runBatchedDeletes(refs);
        });
        return;
      }

      const idsToClear = Array.from(selectedIds);
      for (const id of idsToClear) {
        applyDeselectLocal(id);
      }
      persistLocalSelection();
      updateSidebar();
    }

    function importSelectedGeoJSON(file) {
      const reader = new FileReader();

      reader.onload = function(event) {
        try {
          const geojson = JSON.parse(event.target.result);

          if (!geojson || geojson.type !== 'FeatureCollection' || !Array.isArray(geojson.features)) {
            throw new Error('Imported file is not a valid GeoJSON FeatureCollection.');
          }

          if (firestoreActive) {
            ensureDisplayName();
            const ops = [];
            for (const feature of geojson.features) {
              const featureId = getFeatureId(feature);
              const featureName = getFeatureName(feature);
              if (!featureId) continue;
              if (!layerById.has(featureId)) continue;
              ops.push({ featureId: featureId, featureName: featureName, feature: feature });
            }

            if (ops.length === 0) {
              alert('No buurten from the file could be matched to the map.');
              return;
            }

            setSyncLine('Importing to cloud (upvotes)…');
            void (async function() {
              try {
                for (const op of ops) {
                  await importUpsertUpvoteOp(op);
                  applySelectLocal(op.featureId, op.featureName, op.feature);
                }
                const batch = writeBatch(db);
                writeMeta(batch, 'import GeoJSON');
                await batch.commit();
                persistLocalSelection();
                updateSidebar();
                refreshAllHeatmapStyles();
                setSyncLine('Import complete — live sync');
              } catch (e) {
                console.error(e);
                alert('Import to cloud failed.\n\n' + firestoreErrorMessage(e));
                setSyncLine('Import failed — see alert');
              }
            })();
            return;
          }

          let importedCount = 0;
          let missingCount = 0;

          for (const feature of geojson.features) {
            const featureId = getFeatureId(feature);
            const featureName = getFeatureName(feature);

            if (!featureId) {
              missingCount += 1;
              continue;
            }

            const ok = applySelectLocal(featureId, featureName, feature);
            if (ok) {
              importedCount += 1;
            } else {
              missingCount += 1;
            }
          }

          persistLocalSelection();
          updateSidebar();

          if (importedCount === 0 && missingCount > 0) {
            alert('No buurten from the imported file could be matched to the current map.');
          } else if (missingCount > 0) {
            alert(`Imported ${importedCount} buurten. ${missingCount} could not be matched.`);
          }
        } catch (error) {
          console.error('Import failed:', error);
          alert('Import failed. Please choose a valid exported GeoJSON file.');
        }
      };

      reader.readAsText(file);
    }

    /** Resolves data/buurten.geojson relative to the page URL (fixes GitHub Pages project URLs like /repo vs /repo/). */
    function geojsonFetchUrl() {
      const page = new URL(window.location.href);
      let path = page.pathname;
      if (!path.endsWith('/')) {
        if (path.endsWith('.html')) {
          path = path.replace(/\/[^/]+$/, '/');
        } else {
          path = path + '/';
        }
      }
      return new URL('data/buurten.geojson', page.origin + path).href;
    }

    fetch(geojsonFetchUrl())
      .then(function(response) {
        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }
        return response.json();
      })
      .then(function(data) {
        const buurtenLayer = L.geoJSON(data, {
          style: function(feature) {
            const fid = getFeatureId(feature);
            return pathStyleForFeatureId(fid, {});
          },
          onEachFeature: function(feature, layer) {
            const featureId = getFeatureId(feature);
            const featureName = getFeatureName(feature);
            if (featureId == null || featureId === '') {
              console.warn('[buurten] Feature missing identificatie/id — clicks may not work', featureName, feature);
            }

            layer.feature = feature;
            layerById.set(featureId, layer);

            layer.bindTooltip(featureName, {
              sticky: true,
              direction: 'top',
              opacity: 0.95
            });

            layer.on('mouseover', function() {
              layer.setStyle(pathStyleForFeatureId(featureId, { hover: true }));
            });

            layer.on('mouseout', function() {
              paintLayerById(featureId);
            });

            layer.on('click', function() {
              if (firestoreActive) {
                if (selectedIds.has(featureId)) {
                  const my = myVoteById.get(featureId);
                  const hasMyVote = my === 1 || my === -1;
                  if (!hasMyVote) {
                    applyVoteToggle(featureId, 'up');
                  } else {
                    openVoteModal(featureId, featureName);
                  }
                } else {
                  addBuurtWithInitialUpvote(featureId, featureName, feature);
                }
              } else {
                if (selectedIds.has(featureId)) {
                  applyDeselectLocal(featureId);
                } else {
                  applySelectLocal(featureId, featureName, feature);
                }
                persistLocalSelection();
                updateSidebar();
              }
            });
          }
        }).addTo(map);

        const layerBounds = buurtenLayer.getBounds();
        if (window.matchMedia('(max-width: 768px)').matches) {
          map.fitBounds(layerBounds, { padding: [8, 8], maxZoom: 15 });
        } else {
          map.fitBounds(layerBounds);
        }
        requestAnimationFrame(invalidateMapSize);
        layersReady = true;
        refreshAllHeatmapStyles();

        updateDisplayNameUI();

        if (firestoreActive) {
          restoreLocalSelection();

          function startLiveSync() {
            setSyncLine('Connecting…');
            subscribeCollaboration();
            if (!displayName) {
              openNameModal(true);
            }
          }

          if (selectedIds.size > 0) {
            setSyncLine('Syncing your selection to the cloud…');
            const syncPromise = syncLocalSelectionToFirestore();
            syncPromise.catch(function(e) {
              console.error(e);
              setSyncLine('Could not sync selection — ' + (e && e.code ? e.code : 'error'));
              alert('Could not upload your selection to the cloud.\n\n' + firestoreErrorMessage(e));
            });
            /* Do not block the map (pointer-events / wheel zoom). If commit() hangs, still go live after a cap. */
            Promise.race([
              syncPromise,
              new Promise(function(resolve) {
                window.setTimeout(resolve, 45000);
              })
            ]).finally(function() {
              startLiveSync();
            });
          } else {
            startLiveSync();
          }
        } else {
          setSyncLine('Firebase failed to start — using local-only (this browser).');
          restoreLocalSelection();
        }
      })
      .catch(function(error) {
        console.error('Could not load buurten GeoJSON:', error);
        alert(
          'Could not load data/buurten.geojson (' + geojsonFetchUrl() + '). ' +
          'Commit and push data/buurten.geojson, use HTTP (not file://), and on GitHub Pages use the /repo/ URL.'
        );
      });
    })();
  </script>
