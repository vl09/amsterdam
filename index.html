<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amsterdam Buurten Selector</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info-box {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.96);
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 240px;
      max-width: 340px;
      font-size: 14px;
      line-height: 1.4;
    }

    .info-box h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      background: #111827;
      color: white;
    }

    button.secondary {
      background: #6b7280;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #selection-list {
      margin: 8px 0 0 18px;
      padding-right: 4px;
      max-height: 260px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #selection-list li {
      margin-bottom: 4px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="info-box">
    <h3>Selected buurten</h3>
    <div id="selection-count">0 selected</div>

    <div class="controls">
      <button id="import-btn">Import GeoJSON</button>
      <button id="export-json-btn" disabled>Export GeoJSON</button>
      <button id="export-names-btn" disabled>Export names</button>
      <button id="clear-btn" class="secondary" disabled>Clear all</button>
    </div>

    <ul id="selection-list"></ul>
  </div>

  <input
    id="import-file-input"
    type="file"
    accept=".geojson,.json,application/geo+json,application/json"
    style="display:none"
  />

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const map = L.map('map').setView([52.3728, 4.8936], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const selectedIds = new Set();
    const selectedNames = new Map();
    const selectedFeatures = new Map();
    const layerById = new Map();

    function getFeatureId(feature) {
      return (
        feature.properties?.identificatie ||
        feature.properties?.id ||
        feature.properties?.code ||
        feature.properties?.volgnummer ||
        feature.properties?.naam
      );
    }

    function getFeatureName(feature) {
      return (
        feature.properties?.naam ||
        feature.properties?.name ||
        'Onbekende buurt'
      );
    }

    function baseStyle() {
      return {
        color: '#4b5563',
        weight: 1,
        opacity: 0.9,
        fillColor: '#94a3b8',
        fillOpacity: 0.20
      };
    }

    function hoverStyle() {
      return {
        color: '#1f2937',
        weight: 2,
        opacity: 1,
        fillColor: '#94a3b8',
        fillOpacity: 0.35
      };
    }

    function selectedStyle() {
      return {
        color: '#b91c1c',
        weight: 2,
        opacity: 1,
        fillColor: '#ef4444',
        fillOpacity: 0.55
      };
    }

    function applyStyle(layer, isSelected) {
      layer.setStyle(isSelected ? selectedStyle() : baseStyle());
    }

    function updateButtons(count) {
      document.getElementById('export-json-btn').disabled = count === 0;
      document.getElementById('export-names-btn').disabled = count === 0;
      document.getElementById('clear-btn').disabled = count === 0;
    }

    function updateSidebar() {
      const entries = Array.from(selectedNames.entries())
        .map(([id, name]) => ({ id, name }))
        .sort((a, b) => a.name.localeCompare(b.name));

      document.getElementById('selection-count').textContent = `${entries.length} selected`;

      const ul = document.getElementById('selection-list');
      ul.innerHTML = '';

      for (const entry of entries) {
        const li = document.createElement('li');
        li.textContent = entry.name;
        ul.appendChild(li);
      }

      updateButtons(entries.length);
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    function exportSelectedGeoJSON() {
      const features = Array.from(selectedFeatures.values());
      const geojson = {
        type: 'FeatureCollection',
        features: features
      };

      downloadFile(
        'selected_buurten.geojson',
        JSON.stringify(geojson, null, 2),
        'application/geo+json'
      );
    }

    function exportSelectedNames() {
      const names = Array.from(selectedNames.values()).sort((a, b) => a.localeCompare(b));
      downloadFile(
        'selected_buurten.txt',
        names.join('\n'),
        'text/plain;charset=utf-8'
      );
    }

    function selectFeature(featureId, featureName, feature) {
      const layer = layerById.get(featureId);
      if (!layer) return false;

      selectedIds.add(featureId);
      selectedNames.set(featureId, featureName);
      selectedFeatures.set(featureId, JSON.parse(JSON.stringify(feature)));
      applyStyle(layer, true);
      return true;
    }

    function deselectFeature(featureId) {
      const layer = layerById.get(featureId);
      if (layer) {
        applyStyle(layer, false);
      }

      selectedIds.delete(featureId);
      selectedNames.delete(featureId);
      selectedFeatures.delete(featureId);
    }

    function clearAllSelections() {
      const idsToClear = Array.from(selectedIds);
      for (const id of idsToClear) {
        deselectFeature(id);
      }
      updateSidebar();
    }

    function importSelectedGeoJSON(file) {
      const reader = new FileReader();

      reader.onload = function(event) {
        try {
          const geojson = JSON.parse(event.target.result);

          if (!geojson || geojson.type !== 'FeatureCollection' || !Array.isArray(geojson.features)) {
            throw new Error('Imported file is not a valid GeoJSON FeatureCollection.');
          }

          let importedCount = 0;
          let missingCount = 0;

          for (const feature of geojson.features) {
            const featureId = getFeatureId(feature);
            const featureName = getFeatureName(feature);

            if (!featureId) {
              missingCount += 1;
              continue;
            }

            const success = selectFeature(featureId, featureName, feature);
            if (success) {
              importedCount += 1;
            } else {
              missingCount += 1;
            }
          }

          updateSidebar();

          if (importedCount === 0 && missingCount > 0) {
            alert('No buurten from the imported file could be matched to the current map.');
          } else if (missingCount > 0) {
            alert(`Imported ${importedCount} buurten. ${missingCount} could not be matched.`);
          }
        } catch (error) {
          console.error('Import failed:', error);
          alert('Import failed. Please choose a valid exported GeoJSON file.');
        }
      };

      reader.readAsText(file);
    }

    document.getElementById('import-btn').addEventListener('click', function() {
      document.getElementById('import-file-input').click();
    });

    document.getElementById('import-file-input').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        importSelectedGeoJSON(file);
      }
      event.target.value = '';
    });

    document.getElementById('export-json-btn').addEventListener('click', exportSelectedGeoJSON);
    document.getElementById('export-names-btn').addEventListener('click', exportSelectedNames);
    document.getElementById('clear-btn').addEventListener('click', clearAllSelections);

    fetch('https://api.data.amsterdam.nl/v1/gebieden/buurten?_format=geojson')
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        const buurtenLayer = L.geoJSON(data, {
          style: baseStyle,
          onEachFeature: function(feature, layer) {
            const featureId = getFeatureId(feature);
            const featureName = getFeatureName(feature);

            layerById.set(featureId, layer);

            layer.bindTooltip(featureName, {
              sticky: true,
              direction: 'top',
              opacity: 0.95
            });

            layer.on('mouseover', function() {
              if (!selectedIds.has(featureId)) {
                layer.setStyle(hoverStyle());
              }
            });

            layer.on('mouseout', function() {
              applyStyle(layer, selectedIds.has(featureId));
            });

            layer.on('click', function() {
              if (selectedIds.has(featureId)) {
                deselectFeature(featureId);
              } else {
                selectFeature(featureId, featureName, feature);
              }
              updateSidebar();
            });
          }
        }).addTo(map);

        map.fitBounds(buurtenLayer.getBounds());
      })
      .catch(error => {
        console.error('Could not load buurten GeoJSON:', error);
        alert(
          'Could not load the Amsterdam buurten GeoJSON directly. ' +
          'If needed, download the GeoJSON first and load it locally instead.'
        );
      });
  </script>
</body>
</html>
